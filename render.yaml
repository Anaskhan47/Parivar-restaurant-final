services:
  - type: web
    name: parivar-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: parivar-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: ALGORITHM
        value: HS256
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: 10080
      - key: CORS_ORIGINS
        value: https://parivar-rest.vercel.app,https://parivar.vercel.app,http://localhost:5173

databases:
  - name: parivar-db
    databaseName: parivar
    user: parivar_user
    plan: free
